version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: viral_shorts_db
    environment:
      POSTGRES_USER: viralshorts
      POSTGRES_PASSWORD: viralshorts_password
      POSTGRES_DB: viral_shorts_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viralshorts"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: viral_shorts_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: viral_shorts_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://viralshorts:viralshorts_password@postgres:5432/viral_shorts_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - /tmp/viral_shorts:/tmp/viral_shorts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  worker:
    build: .
    container_name: viral_shorts_worker
    command: celery -A queue.worker worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://viralshorts:viralshorts_password@postgres:5432/viral_shorts_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - /tmp/viral_shorts:/tmp/viral_shorts
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  frontend:
    build:
      context: ./client
    container_name: viral_shorts_frontend
    environment:
      - VITE_API_URL=http://api:8000
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
